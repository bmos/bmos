name: Python Tests

on:
  workflow_call:
    inputs:
      test_folder: { type: string, default: 'tests' }
      run_coverage: { type: boolean, default: true }
      install_patchright: { type: boolean, default: false }
      python_version:
        required: false
        type: string
        default: "['3.11', '3.12', '3.13', '3.14']"

env:
  CACHE_GLOBS: |
    **/pyproject.toml
    **/uv.lock
  ENDPOINT_WHITELIST: >-
    pypi.org:443
    github.com:443
    releases.astral.sh
    files.pythonhosted.org:443
    *.githubusercontent.com:443
    *.github.com:443

jobs:
  pytest:
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJson(inputs.python_version) }}
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        resolution:
          - highest
          - lowest-direct

    runs-on: ${{ matrix.os }}

    permissions:
      contents: write

    steps:
      - uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b
        with:
          disable-sudo: ${{ !inputs.install_patchright }}
          egress-policy: ${{ !inputs.install_patchright && 'block' || 'audit' }}
          allowed-endpoints: ${{ env.ENDPOINT_WHITELIST}}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - id: pytest-run-key
        shell: bash
        run: |
          HASH=${{ hashFiles('pyproject.toml') }}
          VAL="${HASH}-${{ matrix.os }}-${{ matrix.python-version }}-${{ matrix.resolution }}"
          echo "RUN_KEY=$VAL" >> $GITHUB_ENV

      - uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098
        with:
          python-version: ${{ matrix.python-version }}
          activate-environment: true
          cache-dependency-glob: ${{ env.CACHE_GLOBS }}

      - run: >-
          uv sync
          --upgrade
          --group ${{ inputs.run_coverage && 'test-coverage' || 'test' }}
        env:
          UV_NO_DEFAULT_GROUPS: true
          UV_RESOLUTION: ${{ matrix.resolution }}

      - run: uv run patchright install --with-deps
        if: ${{ inputs.install_patchright }}

      - id: cache-pytest
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
        with:
          path: .pytest_cache
          key: pytest-${{ env.RUN_KEY }}

      - run: uv run pytest ${{ inputs.test_folder }}
        env:
          COVERAGE_FILE: .coverage.${{ env.RUN_KEY }}

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: coverage-${{ env.RUN_KEY }}
          path: .coverage.${{ env.RUN_KEY }}
          include-hidden-files: true

  coverage:
    if: ${{ inputs.run_coverage }}

    runs-on: ubuntu-latest

    needs: pytest

    permissions:
      pull-requests: write
      contents: write

    steps:
      - uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: img.shields.io:443 ${{ env.ENDPOINT_WHITELIST}}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3
        with:
          pattern: coverage-*
          merge-multiple: true

      - id: coverage_comment
        uses: py-cov-action/python-coverage-comment-action@7188638f871f721a365d644f505d1ff3df20d683
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MERGE_COVERAGE_FILES: true

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        if: steps.coverage_comment.outputs.COMMENT_FILE_WRITTEN == 'true'
        with:
          name: python-coverage-comment-action
          path: python-coverage-comment-action.txt
